<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Pitching Metrics Summary</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        h1, h2 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
        th, td { padding: 10px; border: 1px solid #ccc; text-align: center; }
        th { background-color: #eee; }
        .tab-buttons { overflow: hidden; border-bottom: 1px solid #ccc; }
        .tab-buttons button { background-color: #f1f1f1; float: left; border: none; outline: none; cursor: pointer; padding: 14px 16px; transition: 0.3s; }
        .tab-buttons button:hover { background-color: #ddd; }
        .tab-buttons button.active { background-color: #ccc; }
        .tab-content { display: none; padding: 20px; background-color: white; border: 1px solid #ccc; border-top: none; }
        .tab-content.active { display: block; }
        .flex-container { display: flex; gap: 40px; flex-wrap: wrap; margin-top: 20px; }
        .left-block, .right-block { flex: 1 1 45%; }
        .right-block canvas { max-width: 100%; margin-top: 20px; }
        .header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2c3e50;
            color: white;
            padding: 30px 40px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            height: 150px;
            overflow: hidden;
        }
        .header-text { text-align: center; z-index: 2; }
        .header-img-right { position: absolute; right: 40px; bottom: 0; height: 170px; z-index: 1; }
        .header-img-left { position: absolute; left: 20px; bottom: 0; height: 170px; z-index: 1; }
        .header-text h1 { margin: 0; font-size: 32px; color: white; }
        .header p { margin-top: 10px; font-size: 18px; color: #ecf0f1; text-align: center; }
        #error-box { display: none; padding: 20px; background: #fff3f3; border: 1px solid #e0b4b4; border-radius: 8px; margin-top: 20px; }
        form label { margin-left: 12px; }
        form label:first-child { margin-left: 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-text">
        <h1>Pitching Dashboard</h1>
        <p>An Analysis of Amateur Pitching Metrics</p>
    </div>
    <img src="mikolas.png" alt="Right Pitcher" class="header-img-right" />
    <img src="67665cdf-22fb-4154-b3b7-014d9c2b75cc.png" alt="Left Pitcher" class="header-img-left" />
</div>

<form id="analysis-form">
    <label for="pitcher">Select Pitcher:</label>
    <select name="pitcher" id="pitcher">
        <option value="Reed Interdonato">Reed Interdonato</option>
        <option value="Hank Lippman">Hank Lippman</option>
    </select>

    <label for="start_date">Start Date:</label>
    <input type="date" name="start_date" id="start_date">

    <label for="end_date">End Date:</label>
    <input type="date" name="end_date" id="end_date">

    <input type="submit" value="Run Analysis">
</form>

<div id="error-box"></div>

<div id="dashboard">

<div class="tab-buttons">
    <button class="tab-link active" onclick="openTab(event, 'summary')">Summary Table</button>
    <button class="tab-link" onclick="openTab(event, 'comparison')">MLB Shape Comparison</button>
</div>

<div id="summary" class="tab-content active">
    <div class="flex-container">
        <div class="left-block">
            <h2>Pitching Summary</h2>
            <table>
                <thead>
                    <tr>
                        <th>Pitch</th>
                        <th>Velocity (Avg)</th>
                        <th>Velocity (Max)</th>
                        <th>Spin Rate (Avg)</th>
                        <th>IVB</th>
                        <th>HB</th>
                    </tr>
                </thead>
                <tbody id="summary-tbody"></tbody>
            </table>
        </div>

        <div class="right-block">
            <canvas id="pitch-shapes-chart"></canvas>
        </div>
    </div>
</div>

<div id="comparison" class="tab-content">
    <h2>Closest MLB Pitch Matches (by Shape)</h2>
    <table>
        <thead>
            <tr>
                <th>Your Pitch</th>
                <th>MLB Player</th>
                <th>MLB Pitch</th>
                <th>MLB IVB</th>
                <th>MLB HB (aligned)</th>
                <th>Shape Difference</th>
            </tr>
        </thead>
        <tbody id="comparison-tbody"></tbody>
    </table>
</div>

</div>

<script src="data.js"></script>
<script src="pitching.js"></script>

</body>
</html>
